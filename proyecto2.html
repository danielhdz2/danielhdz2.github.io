<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>My Projects</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background-color: #f0f0f0; }\n        button { margin: 5px; }\n    </style>\n    <script>\n        function createNewProject() {\n            alert('Starting a new project!'); // Logic for starting a new project\n        }\n        function loadExistingProject() {\n            alert('Loading an existing project!'); // Logic for loading an existing project\n        }\n        function viewPreviousProjects() {\n            alert('Viewing previous projects!'); // Logic for viewing previous projects\n        }\n    <\/script>\n</head>\n<body>\n    <header>\n        <h1>My Project Dashboard</h1>\n        <div>\n            <button onclick="createNewProject()">New Project</button>\n            <button onclick="loadExistingProject()">Load Project</button>\n            <button onclick="viewPreviousProjects()">View Previous Projects</button>\n        </div>\n    </header>\n    <main>\n        <h2>Welcome to my projects!</h2>\n        <p>Your projects will be listed here.</p>\n    </main>\n</body>\n</html>
